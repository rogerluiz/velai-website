name: Deploy Velai

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            APP_DIR="/var/www/velai-website"

            # Carrega NVM
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # Clona se não existir, senão faz pull
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone git@github.com:rogerluiz/velai-website.git $APP_DIR
            fi

            cd $APP_DIR
            git pull origin main

            # Instala dependências e faz build
            npm ci
            npm run build

            # Inicia ou reinicia o app no PM2
            if pm2 describe velai > /dev/null 2>&1; then
              pm2 reload velai --update-env
            else
              pm2 start npm --name "velai" -- start
              pm2 save
            fi

            echo "✅ Deploy concluído com sucesso!"

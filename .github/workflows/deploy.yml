name: CI / CD

on:
  push:
    branches: [main, qa, develop]

# Cancela deploy anterior se um novo push chegar na mesma branch
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ────────────────────────────────────────────────────────────────────
  # 1. Qualidade de código — roda no runner do GitHub (rápido, sem VPS)
  # ────────────────────────────────────────────────────────────────────
  checks:
    name: "Checks (types + lint)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint

  # ────────────────────────────────────────────────────────────────────
  # 2. Build — também no runner; evita OOM no VPS de 2 GB
  # ────────────────────────────────────────────────────────────────────
  build:
    name: "Build → ${{ github.ref_name }}"
    runs-on: ubuntu-latest
    needs: checks
    outputs:
      env: ${{ steps.target.outputs.env }}
      port: ${{ steps.target.outputs.port }}
      app: ${{ steps.target.outputs.app }}
      dir: ${{ steps.target.outputs.dir }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # Resolve variáveis do ambiente alvo
      - name: "Resolve target"
        id: target
        shell: bash
        run: |
          case "${{ github.ref_name }}" in
            main)    ENV=prod; PORT=3000 ;;
            qa)      ENV=qa;   PORT=3001 ;;
            develop) ENV=dev;  PORT=3002 ;;
            *)       echo "Branch desconhecida: ${{ github.ref_name }}"; exit 1 ;;
          esac
          echo "env=$ENV"              >> $GITHUB_OUTPUT
          echo "port=$PORT"            >> $GITHUB_OUTPUT
          echo "app=velai-$ENV"        >> $GITHUB_OUTPUT
          echo "dir=/var/www/velai-$ENV" >> $GITHUB_OUTPUT

      - name: "Install"
        run: npm ci

      - name: "Build Next.js (standalone)"
        run: npm run build
        env:
          NEXT_PUBLIC_APP_ENV: ${{ steps.target.outputs.env }}

      # next.config.ts tem output:'standalone' — copia os estáticos para dentro
      - name: "Prepare standalone bundle"
        run: |
          cp -r .next/static  .next/standalone/.next/static
          cp -r public        .next/standalone/public

          # Gera pm2.config.js dentro do bundle para o servidor usar
          cat > .next/standalone/pm2.config.js << 'PMEOF'
          module.exports = {
            apps: [{
              name: "APP_NAME_PLACEHOLDER",
              script: "DIR_PLACEHOLDER/server.js",
              cwd: "DIR_PLACEHOLDER",
              node_args: "--max-old-space-size=350",
              max_memory_restart: "400M",
              env: {
                PORT: "PORT_PLACEHOLDER",
                NODE_ENV: "production",
                HOSTNAME: "127.0.0.1",
              },
            }],
          };
          PMEOF

          # Substitui os placeholders com os valores reais
          sed -i "s|APP_NAME_PLACEHOLDER|${{ steps.target.outputs.app }}|g"  .next/standalone/pm2.config.js
          sed -i "s|DIR_PLACEHOLDER|${{ steps.target.outputs.dir }}|g"       .next/standalone/pm2.config.js
          sed -i "s|PORT_PLACEHOLDER|${{ steps.target.outputs.port }}|g"     .next/standalone/pm2.config.js

      # Sobe o bundle como artifact (5 dias de retenção — útil para rollback)
      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: standalone-${{ steps.target.outputs.env }}-${{ github.sha }}
          path: .next/standalone
          retention-days: 5

  # ────────────────────────────────────────────────────────────────────
  # 3. Deploy — copia o artifact e recarrega o PM2
  # ────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy → ${{ needs.build.outputs.env }}"
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ needs.build.outputs.env }} # liga ao GitHub Environment

    steps:
      - name: "Download artifact"
        uses: actions/download-artifact@v4
        with:
          name: standalone-${{ needs.build.outputs.env }}-${{ github.sha }}
          path: standalone

      - name: "Setup SSH"
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_HOST }}" \
            >> ~/.ssh/known_hosts 2>/dev/null

      - name: "Sync build to server (rsync)"
        run: |
          ssh -p "${{ secrets.SERVER_PORT }}" -i ~/.ssh/deploy_key \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "mkdir -p ${{ needs.build.outputs.dir }}"

          rsync -az --delete \
            -e "ssh -p ${{ secrets.SERVER_PORT }} -i ~/.ssh/deploy_key" \
            standalone/ \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ needs.build.outputs.dir }}/"

      - name: "Reload PM2"
        run: |
          ssh -p "${{ secrets.SERVER_PORT }}" -i ~/.ssh/deploy_key \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "APP='${{ needs.build.outputs.app }}'; DIR='${{ needs.build.outputs.dir }}';
             if pm2 describe \"\$APP\" > /dev/null 2>&1; then
               pm2 reload \"\$DIR/pm2.config.js\"
             else
               pm2 start \"\$DIR/pm2.config.js\"
               pm2 save
             fi
             echo \"✅ \$APP deployado — commit ${{ github.sha }}\""

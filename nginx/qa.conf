# ── qa.usevelai.app — ambiente de pré-produção ──
# Acesso restrito ao IP do desenvolvedor.
# Execute: certbot --nginx -d qa.usevelai.app
# após copiar este arquivo para /etc/nginx/conf.d/qa.conf

server {
    listen 80;
    server_name qa.usevelai.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name qa.usevelai.app;

    # SSL gerenciado pelo Certbot — não editar manualmente
    ssl_certificate     /etc/letsencrypt/live/qa.usevelai.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qa.usevelai.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Restrição de IP ──────────────────────────────────────────────
    # Substitua SEU_IP pelo IP público do desenvolvedor
    allow SEU_IP;
    deny  all;

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options        DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        strict-origin-when-cross-origin;

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # ── Estáticos Next.js ─────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001/_next/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── App ───────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
